<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Типы файлов и расширения</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="manifest" href="../manifest.json" />
    <link rel="stylesheet" href="css/vpr7-3.css" />
    <!-- Yandex.Metrika counter -->
    <script src="../metrika.js"></script>
    <script src="js/vpr7-exam-utils.js"></script>
    <noscript
      ><div>
        <img
          src="https://mc.yandex.ru/watch/107146125"
          style="position: absolute; left: -9999px"
          alt=""
        /></div
    ></noscript>
    <!-- /Yandex.Metrika counter -->
    <script src="js/vpr7-3-generator.js"></script>
  </head>
  <body>
    <div class="container">
      <a href="vpr7.html" class="back-link">← На главную</a>
      <h1>📁 Типы файлов и расширения</h1>

      <div class="instructions">
        Распределите расширения файлов по соответствующим категориям.
        Перетаскивайте мышью или пальцем. Нажмите на расширение, чтобы вернуть
        его в пул.
      </div>

      <div class="extensions-pool">
        <h3>📦 Расширения файлов для распределения</h3>
        <div class="extensions-container" id="extensionsPool"></div>
      </div>

      <div class="categories-grid" id="categoriesGrid"></div>

      <div class="hint-box" id="hintBox">
        <strong>💡 Подсказка:</strong> <span id="hintText"></span>
      </div>

      <div class="feedback" id="feedback">
        <div id="feedbackText"></div>
      </div>

      <div class="results-detail" id="resultsDetail">
        <h4>Подробные результаты:</h4>
        <div id="resultsList"></div>
      </div>

      <div class="buttons">
        <button class="btn btn-check" onclick="checkAnswer()">
          ✓ Проверить
        </button>
        <button class="btn btn-clear" onclick="clearAll()">✕ Очистить</button>
        <button class="btn btn-hint" onclick="showHint()">💡 Подсказка</button>
        <a href="vpr7-3-t.html" class="btn btn-theory">📚 Теория</a>
        <button class="btn btn-reset" onclick="resetGame()">
          🔄 Новое задание
        </button>
      </div>
    </div>

    <script>
      // Используем модуль генератора VPR7_Task3_Generator
      const Generator = window.VPR7_Task3_Generator;

      let categories = {};
      let currentExtensions = [];
      let currentTask = null;
      let answered = false;
      let correctCount = 0;
      let examTaskCompleted = false; // Флаг, что задание уже выполнено в режиме экзамена

      // Загрузка данных из файла с использованием модуля
      async function loadData() {
        categories = await Generator.loadExtensionData("data/vpr7-3.txt");
        startGame();
      }

      // Начало игры
      function startGame() {
        generateTask();
      }

      // Генерация задания с использованием модуля
      function generateTask() {
        answered = false;
        document.getElementById("feedback").className = "feedback";
        document.getElementById("feedback").style.display = "none";
        document.getElementById("resultsDetail").style.display = "none";
        document.getElementById("hintBox").style.display = "none";

        // Генерируем задание через модуль
        currentTask = Generator.generateExtensionsTask(categories, 12);
        currentExtensions = currentTask.selectedExtensions;

        renderCategories();
        renderExtensions(currentExtensions);
      }

      // Отрисовка категорий
      function renderCategories() {
        const grid = document.getElementById("categoriesGrid");
        grid.innerHTML = "";

        Object.keys(categories).forEach((cat) => {
          const card = document.createElement("div");
          card.className = "category-card";
          card.dataset.category = cat;

          const title = document.createElement("h4");
          title.textContent = cat;
          card.appendChild(title);

          const dropzone = document.createElement("div");
          dropzone.className = "category-dropzone";
          dropzone.dataset.category = cat;

          // Drag events
          dropzone.addEventListener("dragover", handleDragOver);
          dropzone.addEventListener("dragleave", handleDragLeave);
          dropzone.addEventListener("drop", handleDrop);

          card.appendChild(dropzone);
          grid.appendChild(card);
        });
      }

      // Отрисовка расширений
      function renderExtensions(extensions) {
        const pool = document.getElementById("extensionsPool");
        pool.innerHTML = "";

        extensions.forEach((item) => {
          const el = createExtensionElement(item);
          pool.appendChild(el);
        });
      }

      // Создание элемента расширения
      function createExtensionElement(item) {
        const el = document.createElement("div");
        el.className = "extension-item";
        el.textContent = item.extension;
        el.draggable = true;
        el.dataset.extension = item.extension;
        // Правильная категория хранится только в currentTask.extensionCategories

        // Drag events
        el.addEventListener("dragstart", handleDragStart);
        el.addEventListener("dragend", handleDragEnd);

        // Touch events
        el.addEventListener("touchstart", handleTouchStart, { passive: false });
        el.addEventListener("touchmove", handleTouchMove, { passive: false });
        el.addEventListener("touchend", handleTouchEnd);

        // Click для возврата в пул
        el.addEventListener("click", handleClick);

        return el;
      }

      // Обработка клика - возврат в пул
      function handleClick(e) {
        const el = e.target;
        const pool = document.getElementById("extensionsPool");

        if (el.parentElement !== pool) {
          pool.appendChild(el);
          el.classList.remove("placed");
        }
      }

      // Drag handlers
      let draggedElement = null;

      function handleDragStart(e) {
        draggedElement = e.target;
        e.target.classList.add("dragging");
        e.dataTransfer.setData("text/plain", e.target.dataset.extension);
        e.dataTransfer.effectAllowed = "move";
      }

      function handleDragEnd(e) {
        e.target.classList.remove("dragging");
        draggedElement = null;

        // Убираем подсветку со всех зон
        document.querySelectorAll(".category-dropzone").forEach((zone) => {
          zone.classList.remove("drag-over");
        });
      }

      function handleDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        e.currentTarget.classList.add("drag-over");
      }

      function handleDragLeave(e) {
        e.currentTarget.classList.remove("drag-over");
      }

      function handleDrop(e) {
        e.preventDefault();
        e.currentTarget.classList.remove("drag-over");

        if (draggedElement) {
          e.currentTarget.appendChild(draggedElement);
          draggedElement.classList.add("placed");
        }
      }

      // Touch handlers
      let touchElement = null;
      let touchClone = null;

      function handleTouchStart(e) {
        e.preventDefault();
        touchElement = e.target;
        const touch = e.touches[0];

        touchClone = touchElement.cloneNode(true);
        touchClone.style.position = "fixed";
        touchClone.style.zIndex = "1000";
        touchClone.style.pointerEvents = "none";
        touchClone.style.opacity = "0.8";
        touchClone.style.transform = "scale(1.1)";
        document.body.appendChild(touchClone);

        updateClonePosition(touch);
        touchElement.classList.add("dragging");
      }

      function handleTouchMove(e) {
        e.preventDefault();
        if (!touchClone) return;

        const touch = e.touches[0];
        updateClonePosition(touch);

        const dropzones = document.querySelectorAll(".category-dropzone");
        const pool = document.getElementById("extensionsPool");
        const poolRect = pool.getBoundingClientRect();

        // Подсвечиваем зоны при наведении
        dropzones.forEach((zone) => {
          zone.classList.remove("drag-over");
          const rect = zone.getBoundingClientRect();

          if (
            touch.clientX >= rect.left &&
            touch.clientX <= rect.right &&
            touch.clientY >= rect.top &&
            touch.clientY <= rect.bottom
          ) {
            zone.classList.add("drag-over");
            zone.appendChild(touchElement);
            touchElement.classList.add("placed");
          }
        });

        // Проверяем пул
        if (
          touch.clientX >= poolRect.left &&
          touch.clientX <= poolRect.right &&
          touch.clientY >= poolRect.top &&
          touch.clientY <= poolRect.bottom
        ) {
          pool.classList.add("drag-over");
          pool.appendChild(touchElement);
          touchElement.classList.remove("placed");
        } else {
          pool.classList.remove("drag-over");
        }
      }

      function handleTouchEnd(e) {
        if (!touchElement || !touchClone) return;

        document.querySelectorAll(".category-dropzone").forEach((zone) => {
          zone.classList.remove("drag-over");
        });
        document.getElementById("extensionsPool").classList.remove("drag-over");

        touchElement.classList.remove("dragging");
        touchClone.remove();
        touchClone = null;
        touchElement = null;
      }

      function updateClonePosition(touch) {
        if (touchClone) {
          touchClone.style.left =
            touch.clientX - touchClone.offsetWidth / 2 + "px";
          touchClone.style.top =
            touch.clientY - touchClone.offsetHeight / 2 + "px";
        }
      }

      // Проверка ответа
      function checkAnswer() {
        if (answered) return;

        const pool = document.getElementById("extensionsPool");
        const poolItems = pool.querySelectorAll(".extension-item");

        if (poolItems.length > 0) {
          alert("Распределите все расширения по категориям!");
          return;
        }

        answered = true;
        let correctAnswers = 0;
        const results = [];
        const totalExtensions = currentTask.totalExtensions;

        // Собираем все размещённые расширения
        const allPlacedExtensions = [];

        // Проверяем каждую категорию
        document.querySelectorAll(".category-card").forEach((card) => {
          const category = card.dataset.category;
          const dropzone = card.querySelector(".category-dropzone");
          const items = dropzone.querySelectorAll(".extension-item");

          let categoryCorrect = 0;
          let categoryTotal = items.length;

          items.forEach((item) => {
            const extension = item.dataset.extension;
            const correctCategory = currentTask.extensionCategories[extension];
            const isCorrect = correctCategory === category;

            allPlacedExtensions.push({
              extension,
              userCategory: category,
              correctCategory,
              isCorrect,
            });

            if (isCorrect) {
              correctAnswers++;
              categoryCorrect++;
            }
          });

          if (categoryTotal > 0) {
            if (categoryCorrect === categoryTotal) {
              card.classList.add("correct");
              card.classList.remove("incorrect");
            } else if (categoryCorrect === 0) {
              card.classList.add("incorrect");
              card.classList.remove("correct");
            } else {
              card.classList.add("incorrect");
              card.classList.remove("correct");
            }
          }
        });

        const feedback = document.getElementById("feedback");
        const feedbackText = document.getElementById("feedbackText");

        if (correctAnswers === totalExtensions) {
          correctCount++;
          feedback.className = "feedback correct";
          feedbackText.textContent =
            "🎉 Отлично! Все расширения распределены правильно!";
        } else {
          feedback.className = "feedback incorrect";
          feedbackText.textContent = `❌ Правильно: ${correctAnswers} из ${totalExtensions}`;
        }

        feedback.style.display = "block";

        // Отправляем результат в родительское окно (режим экзамена)
        VPR7_ExamUtils.sendExamResult(correctAnswers === totalExtensions);

        // Показываем подробные результаты
        const resultsDetail = document.getElementById("resultsDetail");
        const resultsList = document.getElementById("resultsList");
        resultsList.innerHTML = "";

        allPlacedExtensions.forEach((r) => {
          const item = document.createElement("div");
          item.className = `result-item ${r.isCorrect ? "correct" : "incorrect"}`;
          item.innerHTML = `
            <span>${r.extension}</span>
            <span>${r.isCorrect ? "✓" : `✗ (правильно: ${r.correctCategory})`}</span>
          `;
          resultsList.appendChild(item);
        });

        resultsDetail.style.display = "block";
      }

      // Очистка всех категорий
      function clearAll() {
        const pool = document.getElementById("extensionsPool");
        const items = document.querySelectorAll(".extension-item");

        items.forEach((item) => {
          pool.appendChild(item);
          item.classList.remove("placed");
        });

        // Убираем подсветку с карточек
        document.querySelectorAll(".category-card").forEach((card) => {
          card.classList.remove("correct", "incorrect");
        });
      }

      // Сброс игры
      function resetGame() {
        startGame();
      }

      // Показать подсказку
      function showHint() {
        if (answered) return;

        const hintBox = document.getElementById("hintBox");
        const hintText = document.getElementById("hintText");

        if (hintBox.style.display === "none") {
          // Используем функцию generateHints из модуля
          const hint = Generator.generateHints(currentExtensions);
          // Заменяем переносы строк на HTML-теги для корректного отображения
          hintText.innerHTML = hint.replace(/\n/g, "<br>").replace(/:/g, ": ");
          hintBox.style.display = "block";
        } else {
          hintBox.style.display = "none";
        }
      }

      // Приём сообщений от родительского окна (режим экзамена)
      VPR7_ExamUtils.setupExamMessageListener((correct) => {
        examTaskCompleted = true;
        VPR7_ExamUtils.showCompletedMessage(correct, ".container", [
          ".extensions-pool",
          ".categories-grid",
          ".buttons",
          ".hint-box",
        ]);
      });

      // Запуск
      loadData();
      VPR7_ExamUtils.initExamMode();
    </script>
  </body>
</html>
