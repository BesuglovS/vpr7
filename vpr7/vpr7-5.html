<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Логические задачи</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="manifest" href="../manifest.json" />
    <link rel="stylesheet" href="css/vpr7-5.css" />
    <!-- Yandex.Metrika counter -->
    <script src="../metrika.js"></script>
    <script src="js/vpr7-exam-utils.js"></script>
    <noscript
      ><div>
        <img
          src="https://mc.yandex.ru/watch/107146125"
          style="position: absolute; left: -9999px"
          alt=""
        /></div
    ></noscript>
    <!-- /Yandex.Metrika counter -->
  </head>
  <body>
    <div class="container">
      <a href="vpr7.html" class="back-link">← На главную</a>
      <h1>🧩 Логические задачи</h1>

      <div class="instructions">
        Кликайте на ячейки таблицы для постановки плюсов и минусов. Заполните
        таблицу логическими выводами.
      </div>

      <div class="task-card">
        <div class="task-text" id="taskText">Загрузка задания...</div>

        <div class="logic-table-container">
          <table class="logic-table" id="logicTable">
            <thead>
              <tr>
                <th class="name-header">Имя / Фамилия</th>
                <th id="surname1">-</th>
                <th id="surname2">-</th>
                <th id="surname3">-</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>

        <div class="legend">
          <div class="legend-item">
            <div class="legend-box empty"></div>
            <span>Пусто (кликните)</span>
          </div>
          <div class="legend-item">
            <div class="legend-box plus">+</div>
            <span>Плюс (соответствует)</span>
          </div>
          <div class="legend-item">
            <div class="legend-box minus">−</div>
            <span>Минус (не соответствует)</span>
          </div>
        </div>

        <div class="hint-box" id="hintBox" style="display: none">
          <strong>💡 Подсказка:</strong> <span id="hintText"></span>
        </div>

        <div class="feedback" id="feedback">
          <div id="feedbackText"></div>
          <div class="correct-answer" id="correctAnswer"></div>
        </div>

        <div class="reasoning-steps" id="reasoningSteps">
          <h4>Ход рассуждений:</h4>
          <ol id="reasoningList"></ol>
        </div>

        <div class="buttons">
          <button class="btn btn-check" onclick="checkAnswer()">
            ✓ Проверить
          </button>
          <button class="btn btn-clear" onclick="clearAll()">✕ Очистить</button>
          <button class="btn btn-hint" onclick="showHint()">
            💡 Подсказка
          </button>
          <a href="vpr7-5-t.html" class="btn btn-theory">📚 Теория</a>
          <button class="btn btn-reset" onclick="resetGame()">
            🔄 Новое задание
          </button>
        </div>
      </div>
    </div>

    <!-- Generator module -->
    <script src="js/vpr7-5-generator.js"></script>
    <script>
      let currentTask = null;
      let answered = false;
      let examTaskCompleted = false; // Флаг, что задание уже выполнено в режиме экзамена
      let generatorData = null; // Data from generator module

      // Загрузка данных и запуск
      async function loadData() {
        generatorData = await VPR7_Task5_Generator.loadData();
        startGame();
      }

      // Начало игры
      function startGame() {
        generateTask();
      }

      // Генерация задания
      let generateAttempts = 0;
      const MAX_GENERATE_ATTEMPTS = 100;

      function generateTask() {
        answered = false;
        document.getElementById("feedback").className = "feedback";
        document.getElementById("feedback").style.display = "none";
        document.getElementById("hintBox").style.display = "none";
        document.getElementById("reasoningSteps").style.display = "none";

        generateAttempts++;
        if (generateAttempts > MAX_GENERATE_ATTEMPTS) {
          console.error(
            "Не удалось сгенерировать задание после",
            MAX_GENERATE_ATTEMPTS,
            "попыток",
          );
          generateAttempts = 0;
          return;
        }

        // Генерируем задачу с условиями через модуль генератора
        const task = VPR7_Task5_Generator.generateTask(generatorData);

        if (!task) {
          // Если не удалось сгенерировать, пробуем снова
          generateTask();
          return;
        }

        generateAttempts = 0;
        currentTask = task;
        renderTask();
      }

      // Отрисовка задания
      function renderTask() {
        document.getElementById("taskText").innerHTML = currentTask.text;

        // Перемешиваем порядок отображения имён (строки) и фамилий (столбцы)
        const nameOrder = VPR7_Task5_Generator.shuffleArray([0, 1, 2]);
        const surnameOrder = VPR7_Task5_Generator.shuffleArray([0, 1, 2]);

        const displayNames = nameOrder.map((i) => currentTask.names[i]);
        const displaySurnames = surnameOrder.map(
          (i) => currentTask.surnames[i],
        );

        // Сохраняем порядок для проверки
        currentTask.displayNameOrder = nameOrder;
        currentTask.displaySurnameOrder = surnameOrder;

        // Обновляем заголовки таблицы
        document.getElementById("surname1").textContent = displaySurnames[0];
        document.getElementById("surname2").textContent = displaySurnames[1];
        document.getElementById("surname3").textContent = displaySurnames[2];

        // Отрисовываем строки таблицы
        const tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = "";

        displayNames.forEach((name, displayRowIdx) => {
          const originalRowIdx = nameOrder[displayRowIdx];
          const row = document.createElement("tr");

          // Ячейка с именем
          const nameCell = document.createElement("td");
          nameCell.className = "name-cell";
          nameCell.textContent = name;
          row.appendChild(nameCell);

          // Ячейки для кликов
          displaySurnames.forEach((surname, displayColIdx) => {
            const originalColIdx = surnameOrder[displayColIdx];
            const cell = document.createElement("td");
            cell.className = "clickable";
            cell.dataset.displayRow = displayRowIdx;
            cell.dataset.displayCol = displayColIdx;
            cell.dataset.originalRow = originalRowIdx;
            cell.dataset.originalCol = originalColIdx;
            cell.dataset.name = name;
            cell.dataset.surname = surname;

            cell.addEventListener("click", handleCellClick);

            row.appendChild(cell);
          });

          tableBody.appendChild(row);
        });
      }

      // Обработчик клика по ячейке
      function handleCellClick(e) {
        const cell = e.target;
        const currentState = cell.dataset.state || "empty";

        // Циклическое переключение: пусто -> + -> - -> пусто
        switch (currentState) {
          case "empty":
            cell.dataset.state = "plus";
            cell.className = "clickable plus";
            cell.textContent = "+";
            break;
          case "plus":
            cell.dataset.state = "minus";
            cell.className = "clickable minus";
            cell.textContent = "−";
            break;
          case "minus":
            cell.dataset.state = "empty";
            cell.className = "clickable";
            cell.textContent = "";
            break;
        }
      }

      // Проверка ответа
      function checkAnswer() {
        if (answered) return;

        const cells = document.querySelectorAll(".clickable");
        let allFilled = true;
        let correctCount = 0;
        let totalCells = cells.length;

        // Проверяем, все ли ячейки заполнены
        cells.forEach((cell) => {
          if (!cell.dataset.state || cell.dataset.state === "empty") {
            allFilled = false;
          }
        });

        if (!allFilled) {
          alert("Заполните все ячейки таблицы!");
          return;
        }

        answered = true;

        // Строим правильную матрицу ответов (в оригинальных индексах) с использованием функции из генератора
        const correctMatrix =
          VPR7_Task5_Generator.buildCorrectMatrix(currentTask);

        // Проверяем каждую ячейку, используя оригинальные индексы
        cells.forEach((cell) => {
          const originalRow = parseInt(cell.dataset.originalRow);
          const originalCol = parseInt(cell.dataset.originalCol);
          const userState = cell.dataset.state;
          const correctState = correctMatrix[originalRow][originalCol];

          if (userState === correctState) {
            correctCount++;
            if (userState === "plus") {
              cell.classList.add("correct");
            } else {
              cell.classList.add("correct-minus");
            }
          } else {
            cell.classList.add("incorrect");
          }
        });

        const feedback = document.getElementById("feedback");
        const feedbackText = document.getElementById("feedbackText");

        if (correctCount === totalCells) {
          feedback.className = "feedback correct";
          feedbackText.textContent = "🎉 Отлично! Все ячейки заполнены верно!";

          let correctAnswer = "Правильные ответы: ";
          currentTask.correctMatches.forEach((m, i) => {
            correctAnswer += `${m.name} - ${m.surname}`;
            if (i < currentTask.correctMatches.length - 1)
              correctAnswer += ", ";
          });
          document.getElementById("correctAnswer").textContent = correctAnswer;
        } else {
          feedback.className = "feedback incorrect";
          feedbackText.textContent = `❌ Правильно: ${correctCount} из ${totalCells}`;

          let correctAnswer = "Правильные ответы: ";
          currentTask.correctMatches.forEach((m, i) => {
            correctAnswer += `${m.name} - ${m.surname}`;
            if (i < currentTask.correctMatches.length - 1)
              correctAnswer += ", ";
          });
          document.getElementById("correctAnswer").textContent = correctAnswer;
        }

        feedback.style.display = "block";

        // Отправляем результат в родительское окно (режим экзамена)
        VPR7_ExamUtils.sendExamResult(correctCount === totalCells);

        // Показываем ход рассуждений
        if (currentTask.reasoning && currentTask.reasoning.length > 0) {
          const reasoningSteps = document.getElementById("reasoningSteps");
          const reasoningList = document.getElementById("reasoningList");
          reasoningList.innerHTML = "";

          // Адаптируем рассуждения к перемешанному порядку отображения
          const adaptedReasoning = adaptReasoningToDisplayOrder(
            currentTask.reasoning,
            currentTask.names,
            currentTask.surnames,
            currentTask.displayNameOrder,
            currentTask.displaySurnameOrder,
          );

          adaptedReasoning.forEach((step) => {
            const li = document.createElement("li");
            li.innerHTML = step;
            reasoningList.appendChild(li);
          });

          reasoningSteps.style.display = "block";
        }
      }

      // Очистка всех ячеек
      function clearAll() {
        const cells = document.querySelectorAll(".clickable");
        cells.forEach((cell) => {
          cell.dataset.state = "empty";
          cell.className = "clickable";
          cell.textContent = "";
        });

        document.getElementById("feedback").style.display = "none";
        document.getElementById("reasoningSteps").style.display = "none";
        answered = false;
      }

      // Сброс игры
      function resetGame() {
        startGame();
      }

      // Адаптация рассуждений к перемешанному порядку отображения
      function adaptReasoningToDisplayOrder(
        reasoning,
        originalNames,
        originalSurnames,
        nameOrder,
        surnameOrder,
      ) {
        // Создаем маппинг: оригинальное имя -> отображаемое имя
        const nameMapping = {};
        const surnameMapping = {};

        nameOrder.forEach((originalIdx, displayIdx) => {
          nameMapping[originalNames[originalIdx]] = originalNames[originalIdx];
        });

        surnameOrder.forEach((originalIdx, displayIdx) => {
          surnameMapping[originalSurnames[originalIdx]] =
            originalSurnames[originalIdx];
        });

        // Адаптируем каждый шаг рассуждений
        return reasoning.map((step) => {
          let adaptedStep = step;

          // Заменяем имена и фамилии на отображаемые (если они отличаются)
          // Но так как мы перемешиваем только порядок отображения, а не сами имена,
          // то рассуждения остаются корректными - они описывают логику для конкретных имен
          // Проблема в том, что ученик видит имена в другом порядке в таблице

          // Добавляем пояснение к рассуждениям
          if (step.includes("Ответ:")) {
            // Это финальный шаг с ответом - адаптируем его
            let answerStep = step;
            originalNames.forEach((name, i) => {
              const surname = originalSurnames[i];
              // Заменяем на отображаемые имена и фамилии
              const displayName =
                originalNames[nameOrder[nameOrder.indexOf(i)]];
              const displaySurname =
                originalSurnames[surnameOrder[surnameOrder.indexOf(i)]];
              if (displayName !== name || displaySurname !== surname) {
                answerStep = answerStep.replace(
                  `${name}</span> – <span class="highlight">${surname}`,
                  `${displayName}</span> – <span class="highlight">${displaySurname}`,
                );
              }
            });
            return answerStep;
          }

          return adaptedStep;
        });
      }

      // Показать подсказку
      function showHint() {
        const hintBox = document.getElementById("hintBox");
        if (hintBox.style.display === "block") {
          hintBox.style.display = "none";
        } else {
          document.getElementById("hintText").textContent =
            "Анализируйте условия по одному. Если в строке или столбце уже есть плюс, остальные ячейки должны быть минусами.";
          hintBox.style.display = "block";
        }
      }

      // Приём сообщений от родительского окна (режим экзамена)
      VPR7_ExamUtils.setupExamMessageListener((correct) => {
        examTaskCompleted = true;
        VPR7_ExamUtils.showCompletedMessage(correct, ".container", [
          ".game-area",
          ".score-board",
          ".buttons",
        ]);
      });

      // Запуск
      loadData();
      VPR7_ExamUtils.initExamMode();
    </script>
  </body>
</html>
