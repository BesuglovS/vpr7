  <body>
    <div class="container">
      <a href="vpr7.html" class="back-link">← На главную</a>
      <a href="vpr7-6-t.html" class="back-link">📚 Теория</a>
      <h1>📻 Декодирование сообщений</h1>

      <div class="instructions">
        Расшифруйте закодированное сообщение, используя таблицу кодов. Код
        удовлетворяет условию Фано.
      </div>

      <div class="task-card">
        <div class="task-text" id="taskText">Загрузка задания...</div>

        <div class="fano-toggle" id="fanoToggle" onclick="toggleFano()">
          <div class="fano-toggle-header">
            <span class="fano-toggle-title">💡 Условие Фано (подсказка)</span>
            <span class="fano-toggle-icon">▼</span>
          </div>
          <div class="fano-content" id="fanoText"></div>
        </div>

        <div class="code-table-container">
          <table class="code-table" id="codeTable">
            <thead>
              <tr id="tableHeader"></tr>
            </thead>
            <tbody>
              <tr id="tableCodes"></tr>
            </tbody>
          </table>
        </div>

        <div class="answer-section">
          <label class="answer-label">Введите расшифрованное сообщение:</label>
          <input
            type="text"
            class="answer-input"
            id="answerInput"
            placeholder="Ответ..."
            autocomplete="off"
          />
        </div>

        <div class="hint-box" id="hintBox">
          <h4>💡 Подсказка — ход декодирования:</h4>
          <div id="hintSteps"></div>
        </div>

        <div class="feedback" id="feedback">
          <div id="feedbackText"></div>
        </div>

        <div class="buttons">
          <button class="btn btn-check" onclick="checkAnswer()">
            ✓ Проверить
          </button>
          <button class="btn btn-hint" onclick="showHint()">
            💡 Подсказка
          </button>
          <button class="btn btn-reset" onclick="resetGame()">
            🔄 Новая задача
          </button>
        </div>

        <div class="stats">
          <div class="stat-item">
            <div class="stat-value" id="correctCount">0</div>
            <div class="stat-label">Правильно</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">Всего</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let currentTask = null;
      let answered = false;
      let stats = { correct: 0, total: 0 };

      // Символы для кодирования
      const symbolPairs = [
        { symbols: ["0", "1"], name: "0 и 1" },
        { symbols: ["+", "-"], name: "+ и −" },
        { symbols: ["#", "@"], name: "# и @" },
        { symbols: ["*", "^"], name: "* и ^" },
      ];

      // Дополнительные буквы для добавления в таблицу (не используются в словах)
      const extraLetters = [
        "Д",
        "З",
        "Ж",
        "Э",
        "Ю",
        "Я",
        "Ц",
        "Ч",
        "Ш",
        "Щ",
        "Ф",
        "Х",
        "Ь",
        "Ъ",
      ];

      // Слова для кодирования (осмысленные слова от 4 до 7 букв)
      // Каждый набор содержит буквы для кодирования
      const wordSets = [
        {
          letters: ["К", "О", "Т", "А", "М", "Р"],
          words: [
            "КАТОК",
            "МОТОР",
            "ТРАКТ",
            "КОМАР",
            "МАРКА",
            "КАРТА",
            "ТРОТ",
            "ТОРТ",
          ],
        },
        {
          letters: ["М", "И", "Р", "А", "П", "Г"],
          words: ["ПИРАТ", "ГРАФ", "ПАРТА", "РИФМА", "МАРКА", "ГРАММ"],
        },
        {
          letters: ["Л", "Е", "Т", "О", "А", "С"],
          words: [
            "ЛЕТО",
            "ТЕЛО",
            "ЛОСЬ",
            "СОЛЬ",
            "САЛО",
            "СЕЛО",
            "ТЕМА",
            "АТЛЕТ",
          ],
        },
        {
          letters: ["С", "О", "Н", "А", "К", "Т"],
          words: [
            "КОСА",
            "СОТКА",
            "НАСОС",
            "КАСТА",
            "КОНУС",
            "СТОК",
            "ТОСКА",
            "КОНТОРА",
          ],
        },
        {
          letters: ["В", "О", "Л", "А", "К", "С"],
          words: [
            "ВОЛК",
            "КЛОУН",
            "СЛОВО",
            "ВАЛУН",
            "КЛАСС",
            "ОКЛАД",
            "СКЛАД",
            "ВОЛНА",
          ],
        },
        {
          letters: ["Р", "О", "Т", "А", "К", "С"],
          words: [
            "РОСТ",
            "ТРОС",
            "КАСТА",
            "СТРОКА",
            "КОРА",
            "РАКЕТА",
            "КАССА",
            "ТРАКТОР",
          ],
        },
        {
          letters: ["П", "А", "Р", "Т", "О", "К"],
          words: [
            "ПОРТ",
            "РОСТ",
            "ТАНК",
            "ПАРТА",
            "КАРТА",
            "ТОПКА",
            "ТРОПА",
            "КАПОР",
            "ПОРТРЕТ",
          ],
        },
        {
          letters: ["Б", "А", "К", "Р", "Т", "О"],
          words: ["БРАТ", "БАРТОН", "ТАБОР", "РАБОТА", "КАБАН", "БАНК", "ТАБУ"],
        },
        {
          letters: ["З", "О", "Н", "А", "К", "В"],
          words: ["ЗОНТ", "КЛИН", "ЗВОН", "ЗНАК", "ВОЛНА", "СКАЗКА", "ЗАВОД"],
        },
        {
          letters: ["Д", "О", "М", "А", "Р", "К"],
          words: [
            "ДОМА",
            "ДРОБЬ",
            "КОМАР",
            "МОРД",
            "ДРАМА",
            "КАДР",
            "МАРКА",
            "ДРЕЛЬ",
          ],
        },
        {
          letters: ["Г", "О", "Р", "А", "М", "Т"],
          words: ["ГОРА", "ГРОТ", "РОГА", "ТОРГ", "ГРОМАДА", "ГРАММ", "МАРКА"],
        },
        {
          letters: ["Ш", "К", "О", "Л", "А", "Н"],
          words: ["ШКОЛА", "ШАЛУН", "КАША", "ЛУНА", "ШКАФ", "ШПАЛА", "КАЛАН"],
        },
      ];

      // Проверка прямого условия Фано (никакое кодовое слово не является началом другого)
      function checkDirectFano(codes) {
        for (let i = 0; i < codes.length; i++) {
          for (let j = 0; j < codes.length; j++) {
            if (i !== j && codes[i].startsWith(codes[j])) {
              return false;
            }
          }
        }
        return true;
      }

      // Проверка обратного условия Фано (никакое кодовое слово не является окончанием другого)
      function checkReverseFano(codes) {
        for (let i = 0; i < codes.length; i++) {
          for (let j = 0; j < codes.length; j++) {
            if (i !== j && codes[i].endsWith(codes[j])) {
              return false;
            }
          }
        }
        return true;
      }

      // Генерация кодов, удовлетворяющих условию Фано
      // existingCodes - массив уже существующих кодов, которые нужно учитывать
      function generateFanoCodes(letters, symbols, existingCodes = []) {
        const codes = {};
        const usedCodes = [...existingCodes]; // Начинаем с уже существующих кодов

        // Стратегия: создаём коды разной длины так, чтобы ни один не был префиксом другого
        // Используем префиксный код (direct Fano)
        // Минимальная длина кода - 2 символа

        const shuffledLetters = [...letters].sort(() => Math.random() - 0.5);

        // Генерируем все возможные коды (минимальная длина 2)
        function generateAllCodes(symbols, minLength, maxLength) {
          const result = [];
          function generate(current) {
            if (current.length <= maxLength) {
              if (current.length >= minLength) result.push(current);
              for (const s of symbols) {
                generate(current + s);
              }
            }
          }
          generate("");
          return result;
        }

        const allCodes = generateAllCodes(symbols, 2, 4);

        // Перемешиваем коды для разнообразия
        allCodes.sort(() => Math.random() - 0.5);

        // Выбираем коды, удовлетворяющие прямому условию Фано
        for (let i = 0; i < shuffledLetters.length; i++) {
          for (const code of allCodes) {
            if (!usedCodes.includes(code)) {
              // Проверяем, что новый код не нарушает условие Фано
              const testCodes = [...usedCodes, code];
              if (checkDirectFano(testCodes)) {
                codes[shuffledLetters[i]] = code;
                usedCodes.push(code);
                break;
              }
            }
          }
        }

        return codes;
      }

      // Генерация кодов, удовлетворяющих обратному условию Фано
      // existingCodes - массив уже существующих кодов, которые нужно учитывать
      function generateReverseFanoCodes(letters, symbols, existingCodes = []) {
        const codes = {};
        const usedCodes = [...existingCodes]; // Начинаем с уже существующих кодов
        const shuffledLetters = [...letters].sort(() => Math.random() - 0.5);

        // Минимальная длина кода - 2 символа
        function generateAllCodes(symbols, minLength, maxLength) {
          const result = [];
          function generate(current) {
            if (current.length <= maxLength) {
              if (current.length >= minLength) result.push(current);
              for (const s of symbols) {
                generate(current + s);
              }
            }
          }
          generate("");
          return result;
        }

        const allCodes = generateAllCodes(symbols, 2, 4);

        // Перемешиваем коды для разнообразия
        allCodes.sort(() => Math.random() - 0.5);

        for (let i = 0; i < shuffledLetters.length; i++) {
          for (const code of allCodes) {
            if (!usedCodes.includes(code)) {
              const testCodes = [...usedCodes, code];
              if (checkReverseFano(testCodes)) {
                codes[shuffledLetters[i]] = code;
                usedCodes.push(code);
                break;
              }
            }
          }
        }

        return codes;
      }

      // Выбор случайного элемента
      function randomChoice(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      // Генерация задания
      function generateTask() {
        answered = false;
        document.getElementById("feedback").className = "feedback";
        document.getElementById("feedback").style.display = "none";
        document.getElementById("hintBox").style.display = "none";
        document.getElementById("answerInput").value = "";
        document.getElementById("answerInput").className = "answer-input";

        // Выбираем набор букв и символов
        const wordSet = randomChoice(wordSets);
        const symbolPair = randomChoice(symbolPairs);

        // Случайно выбираем тип условия Фано
        const useDirectFano = Math.random() > 0.3;

        let codes;
        let fanoType;

        if (useDirectFano) {
          codes = generateFanoCodes(wordSet.letters, symbolPair.symbols);
          fanoType = "direct";
        } else {
          codes = generateReverseFanoCodes(wordSet.letters, symbolPair.symbols);
          fanoType = "reverse";
        }

        // Добавляем 1-2 лишние буквы, которые не используются в словах
        const usedLetters = wordSet.letters;
        const availableExtraLetters = extraLetters.filter(
          (l) => !usedLetters.includes(l),
        );
        const numExtra = Math.random() < 0.5 ? 1 : 2;
        const shuffledExtra = [...availableExtraLetters].sort(
          () => Math.random() - 0.5,
        );
        const extraLettersToAdd = shuffledExtra.slice(0, numExtra);

        // Генерируем коды для лишних букв с учётом уже существующих кодов
        if (extraLettersToAdd.length > 0) {
          // Получаем массив уже использованных кодов
          const existingCodesArray = Object.values(codes);

          if (fanoType === "direct") {
            const extraCodes = generateFanoCodes(
              extraLettersToAdd,
              symbolPair.symbols,
              existingCodesArray, // Передаём существующие коды
            );
            Object.assign(codes, extraCodes);
          } else {
            const extraCodes = generateReverseFanoCodes(
              extraLettersToAdd,
              symbolPair.symbols,
              existingCodesArray, // Передаём существующие коды
            );
            Object.assign(codes, extraCodes);
          }
        }

        // Выбираем слово для кодирования (только от 4 до 7 букв)
        const validWords = wordSet.words.filter(
          (word) =>
            word.length >= 4 &&
            word.length <= 7 &&
            word.split("").every((letter) => codes[letter]),
        );

        if (validWords.length === 0) {
          // Пробуем снова
          generateTask();
          return;
        }

        const selectedWord = randomChoice(validWords);

        // Кодируем слово
        const encodedMessage = selectedWord
          .split("")
          .map((letter) => codes[letter])
          .join("");

        // Формируем текст задания
        const symbolText = symbolPair.name;

        let taskText;
        if (fanoType === "direct") {
          taskText = `От разведчика была получена следующая шифрограмма, закодированная с использованием двоичного кода (${symbolText}):`;
        } else {
          taskText = `Получена шифрограмма, закодированная с использованием двоичного кода (${symbolText}):`;
        }

        taskText +=
          '<br><div class="message-container" id="messageContainer"></div>';
        taskText +=
          '<div class="divider-hint">💡 Кликните между символами, чтобы поставить разделитель</div>';

        if (fanoType === "direct") {
          taskText += `При передаче шифрограммы было потеряно разбиение на буквы.`;
        } else {
          taskText += `Разбиение на буквы неизвестно.`;
        }

        taskText += `<br><br>Расшифруйте сообщение, используя таблицу кодов. Запишите в ответе расшифрованное сообщение.`;

        // Устанавливаем текст про условие Фано
        const fanoText =
          fanoType === "direct"
            ? "Код удовлетворяет прямому условию Фано: никакое кодовое слово не является началом другого кодового слова. Это позволяет однозначно декодировать сообщение с начала."
            : "Код удовлетворяет обратному условию Фано: никакое кодовое слово не является окончанием другого кодового слова. Это позволяет однозначно декодировать сообщение с конца.";

        document.getElementById("fanoText").textContent = fanoText;

        // Формируем таблицу кодов (горизонтальная)
        const tableHeader = document.getElementById("tableHeader");
        const tableCodes = document.getElementById("tableCodes");
        tableHeader.innerHTML = "";
        tableCodes.innerHTML = "";

        const sortedLetters = Object.keys(codes).sort();
        for (const letter of sortedLetters) {
          const th = document.createElement("th");
          th.textContent = letter;
          tableHeader.appendChild(th);
        }

        for (const letter of sortedLetters) {
          const td = document.createElement("td");
          td.textContent = codes[letter];
          tableCodes.appendChild(td);
        }

        currentTask = {
          word: selectedWord,
          encoded: encodedMessage,
          codes: codes,
          fanoType: fanoType,
          symbols: symbolPair.symbols,
        };

        document.getElementById("taskText").innerHTML = taskText;

        // Создаём интерактивное сообщение с разделителями
        createInteractiveMessage(encodedMessage);
      }

      // Создание интерактивного сообщения с разделителями
      function createInteractiveMessage(encoded) {
        const container = document.getElementById("messageContainer");
        if (!container) return;

        container.innerHTML = "";

        for (let i = 0; i < encoded.length; i++) {
          // Создаём слот для разделителя перед символом
          const dividerSlot = document.createElement("div");
          dividerSlot.className = "message-divider-slot";
          dividerSlot.dataset.position = i;
          dividerSlot.onclick = () => toggleDivider(dividerSlot);
          container.appendChild(dividerSlot);

          // Создаём символ
          const char = document.createElement("span");
          char.className = "message-char";
          char.textContent = encoded[i];
          container.appendChild(char);
        }

        // Добавляем слот для разделителя в конце
        const endDividerSlot = document.createElement("div");
        endDividerSlot.className = "message-divider-slot";
        endDividerSlot.dataset.position = encoded.length;
        endDividerSlot.onclick = () => toggleDivider(endDividerSlot);
        container.appendChild(endDividerSlot);
      }

      // Переключение разделителя
      function toggleDivider(slot) {
        slot.classList.toggle("has-divider");
      }

      // Генерация подсказки
      function showHint() {
        if (answered) return;

        const hintBox = document.getElementById("hintBox");
        const hintSteps = document.getElementById("hintSteps");

        // Если подсказка уже видна - скрываем её
        if (hintBox.style.display === "block") {
          hintBox.style.display = "none";
          return;
        }

        let steps = [];

        if (currentTask.fanoType === "direct") {
          steps.push(
            `<div class="hint-step"><strong>Декодируем с начала сообщения:</strong></div>`,
          );

          let remaining = currentTask.encoded;
          let stepNum = 1;

          while (remaining.length > 0) {
            let found = false;
            for (const [letter, code] of Object.entries(currentTask.codes)) {
              if (remaining.startsWith(code)) {
                const before = remaining;
                remaining = remaining.slice(code.length);
                steps.push(
                  `<div class="hint-step">${stepNum}. <span class="code-part">${before}</span> → начинаемся с <span class="code-part">${code}</span> = <span class="letter-part">${letter}</span>, остаток: <span class="code-part">${remaining || "(пусто)"}</span></div>`,
                );
                stepNum++;
                found = true;
                break;
              }
            }
            if (!found) break;
          }

          steps.push(
            `<div class="hint-step"><span class="result">Ответ: ${currentTask.word}</span></div>`,
          );
        } else {
          steps.push(
            `<div class="hint-step"><strong>Декодируем с конца сообщения (обратное условие Фано):</strong></div>`,
          );

          let remaining = currentTask.encoded;
          let stepNum = 1;

          while (remaining.length > 0) {
            let found = false;
            for (const [letter, code] of Object.entries(currentTask.codes)) {
              if (remaining.endsWith(code)) {
                const before = remaining;
                remaining = remaining.slice(0, -code.length);
                steps.push(
                  `<div class="hint-step">${stepNum}. <span class="code-part">${before}</span> → заканчивается на <span class="code-part">${code}</span> = <span class="letter-part">${letter}</span>, остаток: <span class="code-part">${remaining || "(пусто)"}</span></div>`,
                );
                stepNum++;
                found = true;
                break;
              }
            }
            if (!found) break;
          }

          steps.push(
            `<div class="hint-step"><span class="result">Ответ: ${currentTask.word}</span></div>`,
          );
        }

        hintSteps.innerHTML = steps.join("");
        hintBox.style.display = "block";
      }

      // Проверка ответа
      function checkAnswer() {
        if (answered) return;

        const userAnswer = document
          .getElementById("answerInput")
          .value.toUpperCase()
          .trim();

        if (!userAnswer) {
          alert("Введите расшифрованное сообщение!");
          return;
        }

        answered = true;
        stats.total++;

        const input = document.getElementById("answerInput");
        const feedback = document.getElementById("feedback");
        const feedbackText = document.getElementById("feedbackText");

        const isCorrect = userAnswer === currentTask.word;

        if (isCorrect) {
          stats.correct++;
          input.className = "answer-input correct";
          feedback.className = "feedback correct";
          feedbackText.textContent = "🎉 Правильно! Отличная работа!";
        } else {
          input.className = "answer-input incorrect";
          feedback.className = "feedback incorrect";
          feedbackText.innerHTML = `❌ Неправильно.<br>Правильный ответ: <strong>${currentTask.word}</strong>`;
        }

        feedback.style.display = "block";
        updateStats();
      }

      // Обновление статистики
      function updateStats() {
        document.getElementById("correctCount").textContent = stats.correct;
        document.getElementById("totalCount").textContent = stats.total;
      }

      // Переключение видимости условия Фано
      function toggleFano() {
        const toggle = document.getElementById("fanoToggle");
        toggle.classList.toggle("open");
      }

      // Сброс игры
      function resetGame() {
        // Закрываем подсказку Фано при новой задаче
        document.getElementById("fanoToggle").classList.remove("open");
        generateTask();
      }

      // Обработка Enter
      document
        .getElementById("answerInput")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            checkAnswer();
          }
        });

      // Запуск
      generateTask();
    </script>
  </body>
</html>
