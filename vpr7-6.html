<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Декодирование сообщений</title>
    <link rel="stylesheet" href="css/vpr7-6.css" />
    <!-- Yandex.Metrika counter -->
    <script src="metrika.js"></script>
    <script src="js/vpr7-exam-utils.js"></script>
    <noscript
      ><div>
        <img
          src="https://mc.yandex.ru/watch/107146125"
          style="position: absolute; left: -9999px"
          alt=""
        /></div
    ></noscript>
    <!-- /Yandex.Metrika counter -->
  </head>
  <body>
    <div class="container">
      <a href="vpr7.html" class="back-link">← На главную</a>
      <a href="vpr7-6-t.html" class="back-link">📚 Теория</a>
      <h1>📻 Декодирование сообщений</h1>

      <div class="instructions">
        Расшифруйте закодированное сообщение, используя таблицу кодов. Код
        удовлетворяет условию Фано.
      </div>

      <div class="task-card">
        <div class="task-text" id="taskText">Загрузка задания...</div>

        <div class="fano-toggle" id="fanoToggle" onclick="toggleFano()">
          <div class="fano-toggle-header">
            <span class="fano-toggle-title">💡 Условие Фано (подсказка)</span>
            <span class="fano-toggle-icon">▼</span>
          </div>
          <div class="fano-content" id="fanoText"></div>
        </div>

        <div class="code-table-container">
          <table class="code-table" id="codeTable">
            <thead>
              <tr id="tableHeader"></tr>
            </thead>
            <tbody>
              <tr id="tableCodes"></tr>
            </tbody>
          </table>
        </div>

        <div class="answer-section">
          <label class="answer-label">Введите расшифрованное сообщение:</label>
          <input
            type="text"
            class="answer-input"
            id="answerInput"
            placeholder="Ответ..."
            autocomplete="off"
          />
        </div>

        <div class="hint-box" id="hintBox">
          <h4>💡 Подсказка — ход декодирования:</h4>
          <div id="hintSteps"></div>
        </div>

        <div class="feedback" id="feedback">
          <div id="feedbackText"></div>
        </div>

        <div class="buttons">
          <button class="btn btn-check" onclick="checkAnswer()">
            ✓ Проверить
          </button>
          <button class="btn btn-hint" onclick="showHint()">
            💡 Подсказка
          </button>
          <button class="btn btn-reset" onclick="resetGame()">
            🔄 Новая задача
          </button>
        </div>

        <div class="stats">
          <div class="stat-item">
            <div class="stat-value" id="correctCount">0</div>
            <div class="stat-label">Правильно</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">Всего</div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/vpr7-6-generator.js"></script>
    <script>
      let currentTask = null;
      let answered = false;
      let stats = { correct: 0, total: 0 };
      let examTaskCompleted = false; // Флаг, что задание уже выполнено в режиме экзамена

      // Генерация задания
      function generateTaskUI() {
        answered = false;
        document.getElementById("feedback").className = "feedback";
        document.getElementById("feedback").style.display = "none";
        document.getElementById("hintBox").style.display = "none";
        document.getElementById("answerInput").value = "";
        document.getElementById("answerInput").className = "answer-input";

        // Используем генератор из модуля
        currentTask = VPR7_Task6_Generator.generateTask();

        // Формируем текст задания
        const taskText = VPR7_Task6_Generator.generateTaskText(currentTask);

        // Устанавливаем текст про условие Фано
        document.getElementById("fanoText").textContent =
          VPR7_Task6_Generator.getFanoText(currentTask.fanoType);

        // Формируем таблицу кодов (горизонтальная)
        const tableHeader = document.getElementById("tableHeader");
        const tableCodes = document.getElementById("tableCodes");
        tableHeader.innerHTML = "";
        tableCodes.innerHTML = "";

        const sortedLetters = Object.keys(currentTask.codes).sort();
        for (const letter of sortedLetters) {
          const th = document.createElement("th");
          th.textContent = letter;
          tableHeader.appendChild(th);
        }

        for (const letter of sortedLetters) {
          const td = document.createElement("td");
          td.textContent = currentTask.codes[letter];
          tableCodes.appendChild(td);
        }

        document.getElementById("taskText").innerHTML = taskText;

        // Создаём интерактивное сообщение с разделителями
        createInteractiveMessage(currentTask.encoded);
      }

      // Создание интерактивного сообщения с разделителями
      function createInteractiveMessage(encoded) {
        const container = document.getElementById("messageContainer");
        if (!container) return;

        container.innerHTML = "";

        for (let i = 0; i < encoded.length; i++) {
          // Создаём слот для разделителя перед символом
          const dividerSlot = document.createElement("div");
          dividerSlot.className = "message-divider-slot";
          dividerSlot.dataset.position = i;
          dividerSlot.onclick = () => toggleDivider(dividerSlot);
          container.appendChild(dividerSlot);

          // Создаём символ
          const char = document.createElement("span");
          char.className = "message-char";
          char.textContent = encoded[i];
          container.appendChild(char);
        }

        // Добавляем слот для разделителя в конце
        const endDividerSlot = document.createElement("div");
        endDividerSlot.className = "message-divider-slot";
        endDividerSlot.dataset.position = encoded.length;
        endDividerSlot.onclick = () => toggleDivider(endDividerSlot);
        container.appendChild(endDividerSlot);
      }

      // Переключение разделителя
      function toggleDivider(slot) {
        slot.classList.toggle("has-divider");
      }

      // Генерация подсказки
      function showHint() {
        if (answered) return;

        const hintBox = document.getElementById("hintBox");
        const hintSteps = document.getElementById("hintSteps");

        // Если подсказка уже видна - скрываем её
        if (hintBox.style.display === "block") {
          hintBox.style.display = "none";
          return;
        }

        let steps = [];

        if (currentTask.fanoType === "direct") {
          steps.push(
            `<div class="hint-step"><strong>Декодируем с начала сообщения:</strong></div>`,
          );

          let remaining = currentTask.encoded;
          let stepNum = 1;

          while (remaining.length > 0) {
            let found = false;
            for (const [letter, code] of Object.entries(currentTask.codes)) {
              if (remaining.startsWith(code)) {
                const before = remaining;
                remaining = remaining.slice(code.length);
                steps.push(
                  `<div class="hint-step">${stepNum}. <span class="code-part">${before}</span> → начинаемся с <span class="code-part">${code}</span> = <span class="letter-part">${letter}</span>, остаток: <span class="code-part">${remaining || "(пусто)"}</span></div>`,
                );
                stepNum++;
                found = true;
                break;
              }
            }
            if (!found) break;
          }

          steps.push(
            `<div class="hint-step"><span class="result">Ответ: ${currentTask.word}</span></div>`,
          );
        } else {
          steps.push(
            `<div class="hint-step"><strong>Декодируем с конца сообщения (обратное условие Фано):</strong></div>`,
          );

          let remaining = currentTask.encoded;
          let stepNum = 1;

          while (remaining.length > 0) {
            let found = false;
            for (const [letter, code] of Object.entries(currentTask.codes)) {
              if (remaining.endsWith(code)) {
                const before = remaining;
                remaining = remaining.slice(0, -code.length);
                steps.push(
                  `<div class="hint-step">${stepNum}. <span class="code-part">${before}</span> → заканчивается на <span class="code-part">${code}</span> = <span class="letter-part">${letter}</span>, остаток: <span class="code-part">${remaining || "(пусто)"}</span></div>`,
                );
                stepNum++;
                found = true;
                break;
              }
            }
            if (!found) break;
          }

          steps.push(
            `<div class="hint-step"><span class="result">Ответ: ${currentTask.word}</span></div>`,
          );
        }

        hintSteps.innerHTML = steps.join("");
        hintBox.style.display = "block";
      }

      // Проверка ответа
      function checkAnswer() {
        if (answered) return;

        const userAnswer = document
          .getElementById("answerInput")
          .value.toUpperCase()
          .trim();

        if (!userAnswer) {
          alert("Введите расшифрованное сообщение!");
          return;
        }

        answered = true;
        stats.total++;

        const input = document.getElementById("answerInput");
        const feedback = document.getElementById("feedback");
        const feedbackText = document.getElementById("feedbackText");

        const isCorrect = userAnswer === currentTask.word;

        if (isCorrect) {
          stats.correct++;
          input.className = "answer-input correct";
          feedback.className = "feedback correct";
          feedbackText.textContent = "🎉 Правильно! Отличная работа!";
        } else {
          input.className = "answer-input incorrect";
          feedback.className = "feedback incorrect";
          feedbackText.innerHTML = `❌ Неправильно.<br>Правильный ответ: <strong>${currentTask.word}</strong>`;
        }

        feedback.style.display = "block";
        updateStats();

        // Отправляем результат в родительское окно (режим экзамена)
        VPR7_ExamUtils.sendExamResult(isCorrect);
      }

      // Обновление статистики
      function updateStats() {
        document.getElementById("correctCount").textContent = stats.correct;
        document.getElementById("totalCount").textContent = stats.total;
      }

      // Переключение видимости условия Фано
      function toggleFano() {
        const toggle = document.getElementById("fanoToggle");
        toggle.classList.toggle("open");
      }

      // Сброс игры
      function resetGame() {
        // Закрываем подсказку Фано при новой задаче
        document.getElementById("fanoToggle").classList.remove("open");
        generateTaskUI();
      }

      // Приём сообщений от родительского окна (режим экзамена)
      VPR7_ExamUtils.setupExamMessageListener((correct) => {
        examTaskCompleted = true;
        VPR7_ExamUtils.showCompletedMessage(correct, ".container", [
          ".game-area",
          ".score-board",
          ".buttons",
        ]);
      });

      // Запуск
      generateTaskUI();
      hideExamNavigation();

      // Отправляем высоту после загрузки страницы
      window.addEventListener("load", sendContentHeight);
      window.addEventListener("resize", sendContentHeight);
    </script>
  </body>
</html>
