    <style>

      .header-content {
        max-width: 1400px;

      .back-link {

      .progress-section {

      .task-counter {
        font-size: 1.2rem;

      .progress-bar-container {
        width: 200px;

      }

      .progress-bar {
        height: 100%;

        transition: width 0.3s ease;
      }

      .score-display {
        display: flex;
        align-items: center;

      .score-item {

      .score-value {

      .main-content {
        flex: 1;

      .task-frame-container {
        flex: 1;

        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      }

      .task-frame {
        width: 100%;
        height: 800px;
        min-height: 600px;
        border: none;
        display: block;
      }

      .navigation {
        display: flex;
        justify-content: center;
        gap: 15px;
        padding: 20px;
        flex-wrap: wrap;
      }

      .nav-btn {
        border: none;
        padding: 15px 35px;
        border-radius: 30px;

        transition:
          transform 0.2s,

      .nav-btn:hover:not(:disabled) {
        transform: translateY(-3px);

      .nav-btn:disabled {
        opacity: 0.5;

      .btn-prev {
        background: linear-gradient(145deg, #6c757d 0%, #495057 100%);

      .btn-finish {
        background: linear-gradient(145deg, #11998e 0%, #38ef7d 100%);

      .task-indicators {
        display: flex;

      .task-indicator {
        width: 36px;

      .task-indicator.current {
        border-color: #667eea;

      }

      .task-indicator.completed {
        background: linear-gradient(145deg, #11998e 0%, #38ef7d 100%);

      }

      .task-indicator.completed-wrong {
        background: linear-gradient(145deg, #eb3349 0%, #f45c43 100%);

      }

      .task-indicator.pending {
        background: #e0e0e0;
        color: #666;
      }

      .task-indicator:hover {
        transform: scale(1.1);
      }

      /* Results screen */
      .results-screen {
        display: none;
        flex: 1;
        padding: 20px;

      }

        background: rgba(255, 255, 255, 0.95);

      .results-title {
        font-size: 2rem;

        margin-bottom: 30px;
      }

      .results-score {
        font-size: 4rem;
        font-weight: bold;
        margin-bottom: 20px;
      }

      .results-score.excellent {
        background: linear-gradient(145deg, #11998e 0%, #38ef7d 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .results-score.good {
        background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .results-score.satisfactory {
        background: linear-gradient(145deg, #f093fb 0%, #f5576c 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .results-score.needs-work {
        background: linear-gradient(145deg, #eb3349 0%, #f45c43 100%);

      .results-message {

      .results-details {

      .result-detail-value {

      .result-detail-label {

      }

      .results-breakdown {
        margin-top: 30px;
        text-align: left;
      }

      .results-breakdown h3 {
        color: #333;
        margin-bottom: 15px;
        text-align: center;
      }

      .breakdown-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 10px;
      }

      .breakdown-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 15px;
        background: #f8f9fa;
        border-radius: 10px;
      }

      .breakdown-item.correct {
        border-left: 4px solid #38ef7d;
      }

      .breakdown-item.incorrect {
        border-left: 4px solid #f45c43;
      }

      .breakdown-item.skipped {
        border-left: 4px solid #ffc107;
      }

      .breakdown-number {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 0.9rem;
        background: #e0e0e0;
      }

      .breakdown-item.correct .breakdown-number {
        background: linear-gradient(145deg, #11998e 0%, #38ef7d 100%);
        color: white;
      }

      .breakdown-item.incorrect .breakdown-number {
        background: linear-gradient(145deg, #eb3349 0%, #f45c43 100%);
        color: white;
      }

      .breakdown-item.skipped .breakdown-number {
        background: linear-gradient(145deg, #ffc107 0%, #ff9800 100%);
        color: white;
      }

      .breakdown-status {
        font-size: 1.2rem;
      }

      .results-buttons {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 30px;
        flex-wrap: wrap;
      }

      .results-btn {
        border: none;
        padding: 15px 30px;
        border-radius: 30px;
        font-size: 1.1rem;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        font-weight: 600;
        text-decoration: none;
      }

      .results-btn:hover {
        transform: translateY(-3px);
      }

      .btn-restart {
        background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
        color: white;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      }

      .btn-home {
        background: linear-gradient(145deg, #6c757d 0%, #495057 100%);
        color: white;
        box-shadow: 0 4px 15px rgba(108, 117, 125, 0.4);
      }

      @media (max-width: 768px) {
        .header-content {
          flex-direction: column;
          text-align: center;

        .progress-section {
          width: 100%;

        }

        .results-title {
          font-size: 1.5rem;
        }

        .results-score {
          font-size: 3rem;
        }
      }

  <body>
    <header class="header">
      <div class="header-content">

          </div>

    </header>

    <div class="task-indicators" id="taskIndicators"></div>

    <main class="main-content">
      <div class="task-frame-container" id="taskContainer">
        <iframe class="task-frame" id="taskFrame" src=""></iframe>
      </div>

      <div class="results-screen" id="resultsScreen">
        <div class="results-card">
          <h1 class="results-title">🎓 Результаты ВПР</h1>
          <div class="results-score" id="finalScore">0/12</div>
          <p class="results-message" id="resultsMessage">Отличная работа!</p>

          <div class="results-details">
            <div class="result-detail-item">
              <div class="result-detail-value" id="detailCorrect">0</div>
              <div class="result-detail-label">Правильных ответов</div>
            </div>
            <div class="result-detail-item">
              <div class="result-detail-value" id="detailIncorrect">0</div>
              <div class="result-detail-label">Неправильных ответов</div>
            </div>
            <div class="result-detail-item">
              <div class="result-detail-value" id="detailPercent">0%</div>
              <div class="result-detail-label">Процент выполнения</div>
            </div>
          </div>

          <div class="results-breakdown">
            <h3>📋 Детализация по заданиям</h3>
            <div class="breakdown-list" id="breakdownList"></div>
          </div>

          <div class="results-buttons">
            <button class="results-btn btn-restart" onclick="restartExam()">
              🔄 Пройти заново
            </button>
            <a href="vpr7.html" class="results-btn btn-home">🏠 На главную</a>
          </div>
        </div>
      </div>
    </main>

    <nav class="navigation" id="navigation">
      <button class="nav-btn btn-prev" id="btnPrev" onclick="prevTask()">
        ← Назад
      </button>
      <button class="nav-btn btn-next" id="btnNext" onclick="nextTask()">
        Далее →
      </button>
      <button class="nav-btn btn-finish" id="btnFinish" onclick="finishExam()">
        ✓ Завершить
      </button>
    </nav>

    <script>
      // Задания
      const tasks = [
        { file: "vpr7-1.html", title: "Устройства компьютера" },
        { file: "vpr7-2.html", title: "Пути к файлам" },
        { file: "vpr7-3.html", title: "Типы файлов" },
        { file: "vpr7-4.html", title: "URL-адреса" },
        { file: "vpr7-5.html", title: "Логические задачи" },
        { file: "vpr7-6.html", title: "Декодирование сообщений" },
        { file: "vpr7-7.html", title: "Объём информации" },
        { file: "vpr7-8.html", title: "Объём текстовой информации" },
        { file: "vpr7-9.html", title: "Передача информации" },
        { file: "vpr7-10.html", title: "Объём информации в предложении" },
        { file: "vpr7-11.html", title: "Цветовая модель RGB" },
        { file: "vpr7-12.html", title: "Форматирование текста" },
      ];

      // Состояние экзамена
      let currentTaskIndex = 0;
      let results = {}; // { taskIndex: { completed: boolean, correct: boolean } }
      let correctCount = 0;
      let attemptedCount = 0;

      // Инициализация
      function init() {
        loadResults();
        renderTaskIndicators();
        loadTask(currentTaskIndex);
        updateUI();
      }

      // Загрузка результатов из localStorage
      function loadResults() {
        const saved = localStorage.getItem("vpr7-exam-results");
        if (saved) {
          const data = JSON.parse(saved);
          results = data.results || {};
          correctCount = data.correctCount || 0;
          attemptedCount = data.attemptedCount || 0;
        }
      }

      // Сохранение результатов в localStorage
      function saveResults() {
        localStorage.setItem(
          "vpr7-exam-results",
          JSON.stringify({
            results,
            correctCount,
            attemptedCount,
          }),
        );
      }

      // Отрисовка индикаторов заданий
      function renderTaskIndicators() {
        const container = document.getElementById("taskIndicators");
        container.innerHTML = "";

        tasks.forEach((task, index) => {
          const indicator = document.createElement("div");
          indicator.className = "task-indicator";
          indicator.textContent = index + 1;
          indicator.onclick = () => goToTask(index);

          if (index === currentTaskIndex) {
            indicator.classList.add("current");
          }

          // Устанавливаем статус - только один класс
          if (results[index]) {
            if (results[index].correct) {
              indicator.classList.add("completed");
            } else {
              indicator.classList.add("completed-wrong");
            }
          } else {
            indicator.classList.add("pending");
          }

          container.appendChild(indicator);
        });
      }

      // Загрузка задания
      function loadTask(index) {
        const frame = document.getElementById("taskFrame");
        frame.src = tasks[index].file + "?examMode=1";
        currentTaskIndex = index;
        updateUI();
        renderTaskIndicators();
      }

      // Автоматическое изменение высоты iframe
      function resizeIframe() {
        const frame = document.getElementById("taskFrame");
        try {
          const doc = frame.contentDocument || frame.contentWindow.document;
          const height = doc.body.scrollHeight;
          frame.style.height = Math.max(height + 50, 600) + "px";
        } catch (e) {
          // Если iframe ещё не загрузился или кросс-домен
          frame.style.height = "800px";
        }
      }

      // Слушатель загрузки iframe
      document.getElementById("taskFrame").onload = function () {
        resizeIframe();
      };

      // Обновление UI
      function updateUI() {
        // Счётчик заданий
        document.getElementById("currentTaskNum").textContent =
          currentTaskIndex + 1;

        // Прогресс-бар
        const progress = ((currentTaskIndex + 1) / tasks.length) * 100;
        document.getElementById("progressBar").style.width = progress + "%";

        // Счётчики
        document.getElementById("correctScore").textContent = correctCount;
        document.getElementById("totalAttempted").textContent = attemptedCount;

        // Кнопки навигации
        document.getElementById("btnPrev").disabled = currentTaskIndex === 0;

        // Показываем/скрываем кнопки
        if (currentTaskIndex === tasks.length - 1) {
          document.getElementById("btnNext").style.display = "none";
          document.getElementById("btnFinish").style.display = "flex";
        } else {
          document.getElementById("btnNext").style.display = "flex";
          document.getElementById("btnFinish").style.display = "none";
        }
      }

      // Навигация
      function prevTask() {
        if (currentTaskIndex > 0) {
          loadTask(currentTaskIndex - 1);
        }
      }

      function nextTask() {
        if (currentTaskIndex < tasks.length - 1) {
          loadTask(currentTaskIndex + 1);
        }
      }

      function goToTask(index) {
        loadTask(index);
      }

      // Завершение экзамена
      function finishExam() {
        showResults();
      }

      // Показ результатов
      function showResults() {
        document.getElementById("taskContainer").style.display = "none";
        document.getElementById("navigation").style.display = "none";
        document.getElementById("resultsScreen").style.display = "flex";
        document.querySelector(".task-indicators").style.display = "none";

        // Подсчёт результатов
        let correct = 0;
        let incorrect = 0;
        let skipped = 0;

        tasks.forEach((task, index) => {
          if (results[index]) {
            if (results[index].correct) {
              correct++;
            } else {
              incorrect++;
            }
          } else {
            skipped++;
          }
        });

        const total = tasks.length;
        const percent = Math.round((correct / total) * 100);

        // Отображение оценки
        const scoreEl = document.getElementById("finalScore");
        scoreEl.textContent = `${correct}/${total}`;

        // Определение класса для оценки
        scoreEl.className = "results-score";
        if (percent >= 90) {
          scoreEl.classList.add("excellent");
        } else if (percent >= 70) {
          scoreEl.classList.add("good");
        } else if (percent >= 50) {
          scoreEl.classList.add("satisfactory");
        } else {
          scoreEl.classList.add("needs-work");
        }

        // Сообщение
        const messageEl = document.getElementById("resultsMessage");
        if (percent >= 90) {
          messageEl.textContent = "Превосходно! Вы отлично подготовлены к ВПР!";
        } else if (percent >= 70) {
          messageEl.textContent =
            "Хороший результат! Продолжайте тренироваться!";
        } else if (percent >= 50) {
          messageEl.textContent = "Неплохо, но есть над чем поработать.";
        } else {
          messageEl.textContent =
            "Рекомендуем ещё раз изучить теорию и потренироваться.";
        }

        // Детали
        document.getElementById("detailCorrect").textContent = correct;
        document.getElementById("detailIncorrect").textContent = incorrect;
        document.getElementById("detailPercent").textContent = percent + "%";

        // Детализация по заданиям
        const breakdownList = document.getElementById("breakdownList");
        breakdownList.innerHTML = "";

        tasks.forEach((task, index) => {
          const item = document.createElement("div");
          let statusClass, statusIcon;

          if (results[index]) {
            if (results[index].correct) {
              statusClass = "correct";
              statusIcon = "✓";
            } else {
              statusClass = "incorrect";
              statusIcon = "✗";
            }
          } else {
            statusClass = "skipped";
            statusIcon = "—";
          }

          item.className = `breakdown-item ${statusClass}`;
          item.innerHTML = `
            <div class="breakdown-number">${index + 1}</div>
            <div style="flex: 1;">${task.title}</div>
            <div class="breakdown-status">${statusIcon}</div>
          `;

          breakdownList.appendChild(item);
        });

        // Очистка localStorage
        localStorage.removeItem("vpr7-exam-results");
      }

      // Перезапуск экзамена
      function restartExam() {
        results = {};
        correctCount = 0;
        attemptedCount = 0;
        currentTaskIndex = 0;

        document.getElementById("taskContainer").style.display = "block";
        document.getElementById("navigation").style.display = "flex";
        document.getElementById("resultsScreen").style.display = "none";
        document.querySelector(".task-indicators").style.display = "flex";

        loadTask(0);
        renderTaskIndicators();
        updateUI();
      }

      // Приём сообщений от iframe
      window.addEventListener("message", function (event) {
        // Обработка высоты контента
        if (event.data && event.data.type === "vpr7-content-height") {
          const frame = document.getElementById("taskFrame");
          const height = event.data.height;
          if (height && height > 400) {
            frame.style.height = height + 20 + "px";
          }
        }

        // Проверяем тип сообщения
        if (event.data && event.data.type === "vpr7-task-result") {
          const taskIndex = currentTaskIndex;
          const isCorrect = event.data.correct;

          // Записываем результат только если это первая попытка
          if (!results[taskIndex]) {
            results[taskIndex] = {
              completed: true,
              correct: isCorrect,
            };

            attemptedCount++;
            if (isCorrect) {
              correctCount++;
            }

            saveResults();
            renderTaskIndicators();
            updateUI();
          }
        }
      });

      // Запуск
      init();
    </script>
  </body>
</html>
