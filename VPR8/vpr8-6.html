<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Логические выражения - Практика</title>
    <link rel="stylesheet" href="css/vpr8-common.css" />
    <link rel="stylesheet" href="css/vpr8-6.css" />
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <script src="../metrika.js"></script>
    <script src="js/vpr8-6-generator.js"></script>
  </head>
  <body>
    <div class="container">
      <a href="vpr8.html" class="back-link">← Назад</a>
      <h1>🔣 Логические выражения</h1>

      <div class="instructions">
        Заполните таблицу истинности для логического выражения. Нажимайте на
        ячейки таблицы, чтобы переключать значения между
        <strong>0</strong> и <strong>1</strong>.
      </div>

      <div class="task-card">
        <p class="task-instruction">Заполните таблицу истинности выражения:</p>
        <span class="expression-display" id="expressionDisplay"></span>

        <div class="truth-table-wrapper" id="tableWrapper">
          <!-- Table is generated by JS -->
        </div>
        <p class="tap-hint">
          👆 Нажмите на ячейку, чтобы ввести значение: первый клик — 0, второй —
          1, и так далее
        </p>

        <div class="feedback" id="feedback"></div>
        <div class="hint-box" id="hintBox"></div>
      </div>

      <div class="buttons">
        <button class="btn btn-check" id="checkBtn">✓ Проверить</button>
        <button class="btn btn-clear" id="clearBtn">✕ Очистить</button>
        <button class="btn btn-hint" id="hintBtn">💡 Подсказка</button>
        <a href="vpr8-6-t.html" class="btn btn-theory">📚 Теория</a>
        <button class="btn btn-reset" id="newTaskBtn">🔄 Новое задание</button>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        initTask6();
      });
    </script>
  </body>
</html>
