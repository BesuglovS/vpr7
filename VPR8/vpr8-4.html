<html lang="ru">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="css/vpr8-common.css" />
    <link rel="stylesheet" href="css/vpr8-4.css" />
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <script src="../metrika.js"></script>
    <script src="../vpr7/js/vpr7-exam-utils.js"></script>
    <script src="js/vpr8-4-generator.js"></script>

      ><div>
        <img
          src="https://mc.yandex.ru/watch/107146125"

  </head>
  <body>
    <div class="container">
      <a href="vpr8.html" class="back-link">← Назад</a>
      <h1>🔢 Вычитание в системах счисления</h1>

      <div class="instructions">
        Выполните вычитание столбиком. Ответ запишите в той же системе
        счисления. Основание системы писать не нужно.
      </div>

      <div class="task-card">
        <div class="task-text" id="taskText">
          Выполните вычитание: 100110₂ – 1011₂.<br />
          Ответ запишите в двоичной системе счисления. Основание системы писать
          не нужно.
        </div>

        <div class="answer-input">
          <input
            type="text"
            id="answerInput"
            placeholder="Введите ответ"
            autocomplete="off"
          />
        </div>

        <div class="feedback" id="feedback"></div>
        <div class="hint-box" id="hintBox"></div>
      </div>

      <div class="buttons">
        <button class="btn btn-check" id="checkBtn">✓ Проверить</button>
        <button class="btn btn-clear" id="clearBtn">✕ Очистить</button>
        <button class="btn btn-hint" id="hintBtn">💡 Подсказка</button>
        <a href="vpr8-4-t.html" class="btn btn-theory">📚 Теория</a>
        <button class="btn btn-reset" id="newTaskBtn">🔄 Новое задание</button>
      </div>
    </div>

    <script>
      // Инициализация при загрузке страницы
      document.addEventListener("DOMContentLoaded", function () {
        initTask4();

        // Exam mode
        VPR7_ExamUtils.setupExamMessageListener((correct) => {
          VPR7_ExamUtils.showCompletedMessage(correct, ".container", [
            ".task-card",
            ".buttons",
          ]);
        });
        VPR7_ExamUtils.hideExamNavigation();
        window.addEventListener("load", VPR7_ExamUtils.sendContentHeight);
        window.addEventListener("resize", VPR7_ExamUtils.sendContentHeight);
      });
    </script>
  </body>
</html>
