  <body>
    <div class="container">
      <a href="vpr8.html" class="back-link">← Назад</a>
      <h1>🧠 Логические высказывания</h1>

      <div class="instructions">
        Укажите номер варианта ответа в соответствии с условием задачи.
      </div>

      <div class="task-card">
        <div class="task-text" id="taskText">
          В поле ответа запишите <strong>номер</strong> имени, для которого
          ЛОЖНО высказывание:<br />
          <span class="highlight logic-expression"
            >НЕ (Первая буква гласная) ИЛИ (Последняя буква гласная)</span
          >
          <ol class="task-options">
            <li>Анна</li>
            <li>Максим</li>
            <li>Татьяна</li>
            <li>Олег</li>
          </ol>
        </div>

        <div class="answer-area">
          <label for="answerInput">Ваш ответ:</label>
          <input
            type="text"
            id="answerInput"
            placeholder="Введите номер ответа"
            autocomplete="off"
          />
        </div>

        <div class="feedback" id="feedback"></div>
        <div class="hint-box" id="hintBox"></div>
      </div>

      <div class="buttons">
        <button class="btn btn-check" id="checkBtn">✓ Проверить</button>
        <button class="btn btn-clear" id="clearBtn">✕ Очистить</button>
        <button class="btn btn-hint" id="hintBtn">💡 Подсказка</button>
        <a href="vpr8-5-t.html" class="btn btn-theory">📚 Теория</a>
        <button class="btn btn-reset" id="newTaskBtn">🔄 Новое задание</button>
